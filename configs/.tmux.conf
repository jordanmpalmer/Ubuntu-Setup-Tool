# proper true color functionality for tmux
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# reduce escape time for nvim
set-option -sg escape-time 10

# enable focus events for nvim autoread
set-option -g focus-events on

# set new leader
set -g prefix C-space
unbind C-b
bind-key C-space send-prefix

# unbind window splits and us h and v
unbind %
bind / split-window -h

unbind '"'
bind . split-window -v
# r to refresh tmux source file
unbind r
bind r source-file ~/.tmux.conf

# resize pane using default vim commands
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# maximize a tmux pane
bind -r m resize-pane -Z 5

# allow using mouse in tmux
set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
# set -g @plugin 'jimeh/tmux-themepack' # to configure tmux theme (disabled for transparency)

# https://github.com/jimeh/tmux-themepack
# set -g @themepack 'powerline/default/cyan' # disabled for transparency

# Powerline Cyan Transparent (based on tmux-themepack powerline/default/cyan)
set -g status-style "fg=colour240,bg=default"
set -g status-justify centre
set -g status-interval 1
set -g status-left-length 60
set -g status-right-length 150

set -g status-left "#[fg=colour233,bg=colour39,bold] #S #[fg=colour39,bg=colour240,nobold]#[fg=colour233,bg=colour240] #(whoami) #[fg=colour240,bg=colour235]#[fg=colour240,bg=colour235] #I:#P #[fg=colour235,bg=default,nobold]"
set -g status-right "#[fg=colour235,bg=default]#[fg=colour240,bg=colour235] %H:%M:%S #[fg=colour240,bg=colour235]#[fg=colour233,bg=colour240] %d-%b-%y #[fg=colour245,bg=colour240]#[fg=colour233,bg=colour245,bold] #H "

set -g window-status-format "  #I:#W#F  "
set -g window-status-current-format "#[fg=colour39,bg=default]#[fg=colour81,bg=colour235,nobold] #I:#W#F #[fg=colour39,bg=default]"
set -g window-status-separator ""
set -g window-status-activity-style "fg=colour245,bg=default"
set -g window-status-current-style "fg=colour81,bg=default"

set -gw pane-border-style "fg=colour238"
set -gw pane-active-border-style "fg=colour39"

set -g message-style "fg=black,bg=colour39"
set -g message-command-style "fg=black,bg=colour39"
set -gw mode-style "fg=black,bg=colour39"
set -g display-panes-active-colour colour245
set -g display-panes-colour colour233
set -gw clock-mode-colour colour39
set -gw clock-mode-style 24


set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality

# set-option -g status-style bg=default

set -g focus-events on

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
